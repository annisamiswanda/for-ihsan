<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ihsan 🤍 | Cinematic Love Story</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* ===== STARS BACKGROUND ===== */
.stars{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:0;
overflow:hidden;
}

.stars span{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.6;
animation:moveStars linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);opacity:.2;}
to{transform:translateY(-100vh);opacity:1;}
}

/* ===== CINEMATIC OVERLAY ===== */
.overlay{
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(255,182,193,.12), rgba(0,0,0,.95));
z-index:1;
}

/* ===== INTRO ===== */
.intro{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 2s ease;
}

.intro h1{
font-family:'Dancing Script',cursive;
font-size:3rem;
margin-bottom:10px;
}

.intro p{
opacity:.7;
margin-bottom:20px;
}

.btn{
padding:12px 26px;
border:none;
border-radius:30px;
background:#ff6f91;
color:white;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ===== SCENES ===== */
.scene{
display:none;
position:relative;
z-index:2;
height:100vh;
padding:40px;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 2s ease;
}

.scene.active{
display:flex;
}

/* ===== PHOTO ===== */
.photo{
width:280px;
border-radius:20px;
box-shadow:0 10px 50px rgba(255,255,255,.1);
margin-bottom:20px;
}

/* ===== TITLE ===== */
.title{
font-family:'Dancing Script',cursive;
font-size:2.5rem;
margin-bottom:10px;
opacity:.9;
}

/* ===== LETTER ===== */
.letter{
max-width:750px;
white-space:pre-wrap;
line-height:2;
font-size:1rem;
opacity:.9;
border-left:2px solid rgba(255,255,255,.3);
padding-left:15px;
}

/* ===== FADE ===== */
.fade-out{
animation:fadeOut 2s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* ===== SMALL TEXT ===== */
.small{
opacity:.6;
margin-top:10px;
}

</style>
</head>

<body>

<!-- STARS -->
<div class="stars" id="stars"></div>
<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">
<h1>a cinematic love story 🤍</h1>
<p>for ihsan, from caca</p>
<button class="btn" onclick="startFilm()">start movie</button>
</div>

<!-- SCENE 1 -->
<div id="scene1" class="scene">
<img class="photo" src="foto-kita.jpeg">
<h2 class="title">this is us</h2>
<p class="small">every story has a beginning...</p>
<button class="btn" onclick="next(1,2)">continue</button>
</div>

<!-- SCENE 2 -->
<div id="scene2" class="scene">
<h2 class="title">silent moments</h2>
<p class="small">some feelings don’t need sound...</p>
<button class="btn" onclick="next(2,3)">continue</button>
</div>

<!-- SCENE 3 -->
<div id="scene3" class="scene">
<h2 class="title">a letter for you 💌</h2>
<div id="letter" class="letter"></div>
</div>

<script>

/* ===== STAR GENERATOR ===== */
const starsContainer = document.getElementById("stars");

for(let i=0;i<80;i++){
let star = document.createElement("span");
star.style.left = Math.random()*100+"%";
star.style.top = Math.random()*100+"%";
star.style.animationDuration = (5+Math.random()*10)+"s";
starsContainer.appendChild(star);
}

/* ===== INTRO ===== */
function startFilm(){
document.getElementById("intro").classList.add("fade-out");

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("scene1").classList.add("active");
},2000);
}

/* ===== NAVIGATION ===== */
function next(current,nextScene){
document.getElementById("scene"+current).classList.remove("active");
document.getElementById("scene"+nextScene).classList.add("active");

if(nextScene===3){
typeLetter();
}
}

/* ===== LETTER TEXT ===== */
const text = `
sayang,

i don’t know how to explain everything perfectly,
but i know one thing for sure.

you make everything feel softer.

even when my mind is loud,
you calm it without even trying.

with you,
i never feel like i’m carrying everything alone.

you feel like home in human form.

thank you for staying,
thank you for understanding me,
thank you for loving me in a way that feels safe.

i love you.
— caca 🤍
`;

/* ===== TYPEWRITER EFFECT ===== */
function typeLetter(){
const el = document.getElementById("letter");
el.innerHTML = "";

let i = 0;

let interval = setInterval(()=>{
el.innerHTML += text[i];
i++;

if(i >= text.length){
clearInterval(interval);
}
},30);
}

</script>

</body>
</html>
