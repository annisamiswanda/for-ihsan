<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ihsan 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

/* ===== CINEMATIC BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* dark cinematic overlay */
.overlay{
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(255,192,203,.15), rgba(0,0,0,.95));
z-index:0;
}

/* intro screen */
.intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
position:relative;
animation:fadeIn 3s ease;
}

.intro h1{
font-family:'Dancing Script',cursive;
font-size:3rem;
margin-bottom:10px;
}

.intro p{
opacity:.8;
}

/* cinematic button */
.btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff7aa2;
color:white;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* scenes */
.scene{
display:none;
height:100vh;
padding:40px;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
animation:fadeIn 2s ease;
}

.active{
display:flex;
}

/* photo cinematic */
.photo{
width:300px;
border-radius:20px;
box-shadow:0 10px 40px rgba(255,255,255,.1);
margin-bottom:20px;
}

/* typing letter */
.letter{
max-width:700px;
line-height:2;
white-space:pre-wrap;
font-size:1rem;
opacity:.9;
}

/* footer */
.footer{
margin-top:20px;
opacity:.7;
}

/* animations */
@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.fade-out{
animation:fadeOut 2s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">
<h1>a cinematic love story 🤍</h1>
<p>for ihsan, from caca</p>
<button class="btn" onclick="start()">start film</button>
</div>

<!-- SCENE 1 -->
<div id="scene1" class="scene">

<img class="photo" src="foto-kita.jpeg">

<h2 style="font-family:'Dancing Script';font-size:2rem;">
this is us
</h2>

<p class="footer">every story starts somewhere…</p>

<button class="btn" onclick="next(1,2)">continue</button>
</div>

<!-- SCENE 2 -->
<div id="scene2" class="scene">

<h2 style="font-family:'Dancing Script';font-size:2rem;">
a moment i remember
</h2>

<p class="footer">
sometimes i overthink… but you always stay.
</p>

<button class="btn" onclick="next(2,3)">continue</button>
</div>

<!-- SCENE 3 (LETTER) -->
<div id="scene3" class="scene">

<h2 style="font-family:'Dancing Script';font-size:2rem;">
a letter for you 💌
</h2>

<div id="letter" class="letter"></div>

</div>

<script>

/* intro start */
function start(){
document.getElementById("intro").classList.add("fade-out");

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("scene1").classList.add("active");
},2000);
}

/* scene transition */
function next(current,nextScene){
document.getElementById("scene"+current).classList.remove("active");
document.getElementById("scene"+nextScene).classList.add("active");

if(nextScene===3){
typeLetter();
}
}

/* typing effect */
const text = `
sayang,

i don’t really know how to explain everything perfectly,
but i just want you to know one thing.

you make everything feel softer.

even when my thoughts are loud,
you somehow make it quiet.

i never feel like i have to go through things alone,
because you’re always there — even in silence.

thank you for loving me in a way
that feels safe, warm, and real.

i love you.
always.

— caca 🤍
`;

let i = 0;

function typeLetter(){
const el = document.getElementById("letter");
el.innerHTML = "";

let interval = setInterval(()=>{
el.innerHTML += text[i];
i++;

if(i >= text.length){
clearInterval(interval);
}
},40);
}

</script>

</body>
</html>
